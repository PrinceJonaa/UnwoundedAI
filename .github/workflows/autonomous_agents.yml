name: Autonomous Agents

on:
  workflow_dispatch:
    inputs:
      role:
        description: "Which autonomous role to run"
        required: true
        default: "docs"
        type: choice
        options:
          - docs
          - refactor
          - red-team
          - all

permissions:
  contents: write
  pull-requests: write

jobs:
  doc_sync:
    name: Daily Doc Sync
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.role == 'docs' || inputs.role == 'all')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: autonomous-doc-sync
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run JULES_DOCUMENTATION_EXPERT
        env:
          AUTONOMOUS_AGENT_CLI: ${{ vars.AUTONOMOUS_AGENT_CLI }}
        run: |
          set -euo pipefail
          if [ -z "${AUTONOMOUS_AGENT_CLI:-}" ]; then
            echo "Missing repository variable AUTONOMOUS_AGENT_CLI."
            echo "Example value: claude-code run --non-interactive"
            exit 1
          fi
          bash -lc "${AUTONOMOUS_AGENT_CLI} --prompt-file docs/agents/JULES_DOCUMENTATION_EXPERT.md --cwd ."

      - name: Validate docs-only diff
        id: docs_guard
        run: |
          set -euo pipefail
          CHANGED="$(git diff --name-only)"
          if [ -z "${CHANGED}" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          INVALID="$(echo "${CHANGED}" | grep -E -v '\\.md$' || true)"
          if [ -n "${INVALID}" ]; then
            echo "JULES_DOCUMENTATION_EXPERT modified non-markdown files:"
            echo "${INVALID}"
            exit 1
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: steps.docs_guard.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/doc-sync
          branch-suffix: timestamp
          delete-branch: true
          commit-message: "docs: sync markdown with code state"
          title: "[AUTO-DOC] Sync docs to current implementation"
          body: |
            Automated docs maintenance PR.

            Role: `JULES_DOCUMENTATION_EXPERT`
            Prompt: `docs/agents/JULES_DOCUMENTATION_EXPERT.md`

            Safety checks:
            - Non-markdown edits are blocked.
            - No PR is created when no doc drift is detected.

            Human review is required before merge.
          labels: |
            type: docs
            cost: actions

  weekly_surgeon:
    name: Weekly Surgeon
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.role == 'refactor' || inputs.role == 'all')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    concurrency:
      group: autonomous-refactor-surgeon
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Baseline tests (required)
        run: pytest -q

      - name: Run JULES_REFACTOR_SURGEON
        env:
          AUTONOMOUS_AGENT_CLI: ${{ vars.AUTONOMOUS_AGENT_CLI }}
        run: |
          set -euo pipefail
          if [ -z "${AUTONOMOUS_AGENT_CLI:-}" ]; then
            echo "Missing repository variable AUTONOMOUS_AGENT_CLI."
            echo "Example value: claude-code run --non-interactive"
            exit 1
          fi
          bash -lc "${AUTONOMOUS_AGENT_CLI} --prompt-file docs/agents/JULES_REFACTOR_SURGEON.md --cwd ."

      - name: Validate single-file scope
        id: surgeon_guard
        run: |
          set -euo pipefail
          CHANGED="$(git diff --name-only | sed '/^$/d')"
          if [ -z "${CHANGED}" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COUNT="$(echo "${CHANGED}" | wc -l | tr -d ' ')"
          if [ "${COUNT}" -ne 1 ]; then
            echo "JULES_REFACTOR_SURGEON must change exactly one file; changed ${COUNT}."
            echo "${CHANGED}"
            exit 1
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "changed_file=$(echo "${CHANGED}" | head -n1)" >> "$GITHUB_OUTPUT"

      - name: Post-change tests (required)
        if: steps.surgeon_guard.outputs.has_changes == 'true'
        run: pytest -q

      - name: Open PR
        if: steps.surgeon_guard.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/refactor-surgeon
          branch-suffix: timestamp
          delete-branch: true
          commit-message: "refactor: single-file cleanup with behavior lock"
          title: "[AUTO-REFACTOR] Single-file maintainability cleanup"
          body: |
            Automated refactor maintenance PR.

            Role: `JULES_REFACTOR_SURGEON`
            Prompt: `docs/agents/JULES_REFACTOR_SURGEON.md`
            Changed file: `${{ steps.surgeon_guard.outputs.changed_file }}`

            Safety checks:
            - `pytest -q` passed before the change.
            - Exactly one file changed.
            - `pytest -q` passed after the change.
            - No new features intended.

            Human review is required before merge.
          labels: |
            type: chore
            cost: actions

  weekly_red_team:
    name: Weekly Red-Team
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.role == 'red-team' || inputs.role == 'all')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: autonomous-red-team
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e '.[dev]'

      - name: Run JULES_RED_TEAM_ATTACKER
        env:
          AUTONOMOUS_AGENT_CLI: ${{ vars.AUTONOMOUS_AGENT_CLI }}
        run: |
          set -euo pipefail
          if [ -z "${AUTONOMOUS_AGENT_CLI:-}" ]; then
            echo "Missing repository variable AUTONOMOUS_AGENT_CLI."
            echo "Example value: claude-code run --non-interactive"
            exit 1
          fi
          bash -lc "${AUTONOMOUS_AGENT_CLI} --prompt-file docs/agents/JULES_RED_TEAM_ATTACKER.md --cwd ."

      - name: Validate red-team scope
        id: red_guard
        run: |
          set -euo pipefail
          ALLOWED="tests/test_red_team_sycophancy.py"
          CHANGED="$(git diff --name-only | sed '/^$/d')"
          if [ -z "${CHANGED}" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          INVALID="$(echo "${CHANGED}" | grep -Ev "^${ALLOWED}$" || true)"
          if [ -n "${INVALID}" ]; then
            echo "JULES_RED_TEAM_ATTACKER modified files outside allowed scope:"
            echo "${INVALID}"
            exit 1
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Run red-team tests
        if: steps.red_guard.outputs.has_changes == 'true'
        run: pytest -q tests/test_red_team_sycophancy.py

      - name: Open PR
        if: steps.red_guard.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/red-team-tests
          branch-suffix: timestamp
          delete-branch: true
          commit-message: "test: expand sycophancy red-team coverage"
          title: "[AUTO-TEST] Expand red-team sycophancy prompts"
          body: |
            Automated test-expansion PR.

            Role: `JULES_RED_TEAM_ATTACKER`
            Prompt: `docs/agents/JULES_RED_TEAM_ATTACKER.md`

            Safety checks:
            - Only `tests/test_red_team_sycophancy.py` may change.
            - Red-team suite passes after changes.
            - No application code modifications allowed.

            Human review is required before merge.
          labels: |
            cost: actions
