name: Bug report
description: Report a reproducible bug
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact commands, inputs, and expected behavior.
      placeholder: |
        1. Run ...
        2. Send request ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, dependency versions.
    validations:
      required: true
